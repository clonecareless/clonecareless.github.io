<section class="footer">
    <div class="container">
        <div class="footer__wrapper">

            <div class="footer__left">
                <h3 class="footer-title">Социальные сети:</h3>
                <a href="https://vk.com/rechistart" class="footer__vk"><img src="{{ "icons/footer/vk_icon.svg" | relURL }}" alt="vk">rechistart</a>
                <a href="https://instagram.com/rechi.start?igshid=MzRlODBiNWFlZA==" class="footer__i"><img src="{{ "icons/footer/i_icon.svg" | relURL }}" alt="inst">rechi.start</a>

            <div class="footer__center">
                <a href="#up" class="logo logo_center"><img src="{{ "icons/logo/logo_finished.svg" | relURL }}" alt="logo"></a>

            </div>

            <div class="footer__right">
                <h3 class="footer-title">Мессенджеры:</h3>
                <div class="footer__icons">
                    <div class="touch touch_bottom">
                        <a href="https://t.me/rechistart" class="touch__telegram">

                            <img
                                src="{{ "icons/messangers/whatsapp.svg" | relURL }}" 
                                alt="wtsp">
                        </a>
                    </div>
                </div>
                <a href="tel:+79281758320" class="phone phone_block phone_footer">+79281758320</a>
